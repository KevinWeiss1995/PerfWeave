services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: perfweave-clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./var/clickhouse:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  perfweave:
    build: .
    image: perfweave:0.1.0
    container_name: perfweave
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      PERFWEAVE_CH_URL: "http://clickhouse:8123"
      PERFWEAVE_LOG_FORMAT: json
    ports:
      - "7777:7777"
      - "7778:7778"
    # GPU access: uncomment when running on an NVIDIA host with the runtime
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
